version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nexus-proxy
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on: [nexus-server]
    networks: [nexus-net]

  nexus-server:
    build: .
    container_name: nexus-server
    restart: unless-stopped
    env_file: .env
    networks: [nexus-net]
    depends_on:
      nexus-db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl --fail https://localhost:8443/api/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s

  nexus-db:
    image: postgres:15-alpine
    container_name: nexus-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/data
    networks: [nexus-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nexus-redis
    restart: unless-stopped
    networks: [nexus-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  motion-detector:
    build: ./motion-detection
    container_name: nexus-motion-detector
    restart: unless-stopped
    env_file: .env
    networks: [nexus-net]
    depends_on: [redis]


networks:
  nexus-net: { driver: bridge }

volumes:
  db-data: